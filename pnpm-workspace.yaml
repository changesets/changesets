packages:
  - packages/*
  - scripts/*
  - site

allowBuilds:
  esbuild: false

blockExoticSubdeps: true
dedupePeers: true
dedupePeerDependents: true
minimumReleaseAge: 10080

overrides:
  rolldown: 1.0.0
  'vitepress>@docsearch/js': '-'
  'vitepress>@docsearch/sidepanel-js': '-'
  'vitepress>vite': ^8.0.0

shellEmulator: true
trustPolicy: no-downgrade
