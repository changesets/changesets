name: Publish

on:
  push:
    branches:
      - main
      - next
      - "maintenance/v*" # branch rulesets don't support v[0-9]+

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
  queue: max

permissions: {} # each job should define its own permission explicitly

jobs:
  select-mode:
    name: Select Mode
    if: ${{ github.repository_owner == 'changesets' }}
    runs-on: ubuntu-latest
    environment: version
    timeout-minutes: 20
    outputs:
      mode: ${{ steps.select-mode.outputs.mode }}
      publish-plan-artifact-id: ${{ steps.select-mode.outputs.publish-plan-artifact-id }}
    permissions:
      contents: read # to check out repo (actions/checkout)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/ci-setup
        with:
          skip-cache: true # avoid cache poisoning attacks

      - name: Build artifacts
        run: pnpm build

      - name: Select mode
        id: select-mode
        # https://github.com/changesets/action
        uses: changesets/action/select-mode@8f7aee55a02899b4d6140157e482211eb49fcbee # v2.0.0-next.2

  version:
    name: Version
    needs: select-mode
    if: needs.select-mode.outputs.mode == 'version'
    runs-on: ubuntu-latest
    environment: version
    timeout-minutes: 20
    permissions:
      contents: read # to check out repo (actions/checkout)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/ci-setup
        with:
          skip-cache: true # avoid cache poisoning attacks

      - name: Build artifacts
        run: pnpm build

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write # to create version commits (changesets/action)
          permission-pull-requests: write # to create pull request (changesets/action)

      - name: Create or update release pull request
        id: changesets
        # https://github.com/changesets/action
        uses: changesets/action/version@8f7aee55a02899b4d6140157e482211eb49fcbee # v2.0.0-next.2
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: pnpm version-packages

  pack:
    name: Pack
    needs: select-mode
    if: needs.select-mode.outputs.mode == 'publish'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      pack-dir-artifact-id: ${{ steps.pack.outputs.pack-dir-artifact-id }}
    permissions:
      contents: read # to check out repo (actions/checkout)
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/ci-setup
        with:
          node-version: 24
          skip-cache: true # avoid cache poisoning attacks

      - name: Build artifacts
        run: pnpm build

      - name: Pack
        id: pack
        # https://github.com/changesets/action
        uses: changesets/action/pack@8f7aee55a02899b4d6140157e482211eb49fcbee # v2.0.0-next.2
        with:
          publish-plan-artifact-id: ${{ needs.select-mode.outputs.publish-plan-artifact-id }}

  publish:
    name: Publish
    needs: pack
    runs-on: ubuntu-latest
    environment: npm
    timeout-minutes: 20
    permissions:
      contents: write # to create release (changesets/action)
      id-token: write # to use OpenID Connect token for trusted publishing (changesets/action)
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/ci-setup
        with:
          node-version: 24
          skip-cache: true # avoid cache poisoning attacks

      - name: Build artifacts
        run: pnpm build

      - name: Publish to npm
        # https://github.com/changesets/action
        uses: changesets/action/publish@8f7aee55a02899b4d6140157e482211eb49fcbee # v2.0.0-next.2
        with:
          pack-dir-artifact-id: ${{ needs.pack.outputs.pack-dir-artifact-id }}
