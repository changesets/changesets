name: Setup CI

inputs:
  node-version:
    description: "Node.js version"
    required: false
    default: "22"
  skip-cache:
    description: "Whether to skip the cache"
    required: false
    default: "false"
  download-dist:
    description: "Whether to download a dist folder artifact from the current run"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

    - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: ${{ inputs.node-version }}
        package-manager-cache: ${{ inputs.skip-cache != 'true' }}
        cache: ${{ inputs.skip-cache != 'true' && 'pnpm' || '' }}

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Check with manypkg
      shell: bash
      run: pnpm manypkg check

    - name: Download dist artifacts
      if: ${{ inputs.download-dist == 'true' }}
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: dist
